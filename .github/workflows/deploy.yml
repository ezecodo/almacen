name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/almacen
            git pull origin main
            cd apps/api
            npm install
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            pm2 restart almacen-api
            cd ../web
            npm install
            npm run build
            cp -r dist/* /var/www/almacen/
